name: tests

on:
  push:
    branches:
      - main
  pull_request:

env:
  TEST_DOCKER_IMAGE: ghcr.io/devbuddy/docker-testing:sha-7fd13f4

jobs:
  linters:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0

  tests:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -timeout 10s -cover ./pkg/...

  tests-fast:
    name: fast CLI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go test -cover -v ./tests/fast

  tests-bash:
    name: bash tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: docker pull $TEST_DOCKER_IMAGE
      - run: TEST_SHELL=bash go test -cover -v ./tests/shell

  tests-zsh:
    name: zsh tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: docker pull $TEST_DOCKER_IMAGE
      - run: TEST_SHELL=zsh go test -cover -v ./tests/shell

  tests-tasks:
    name: Tasks runtime tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: docker pull $TEST_DOCKER_IMAGE
      - run: TEST_SHELL=bash go test -cover -v ./tests/tasks

