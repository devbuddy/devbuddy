# DevBuddy config file
# Run `bud --doc` to learn how to use dev.yml and bud.

env:
  ENV: development

up:
  # MacOS:
  # - homebrew:
  #   - curl
  #   - golangci/tap/golangci-lint

  # Linux:
  # - apt:
  #   - python3-dev

  - python: 3.13.7
  - pip:
    - requirements.txt
    - tests/requirements.txt
  - python_develop
  # For pyproject.toml / uv.lock projects, replace pip/python_develop with:
  # - uv

  # - custom:
  #     name: Create the local tmp directory
  #     met?: test -d tmp
  #     meet: mkdir tmp

commands:
  test:
    desc: Run all tests
    run: go test ./... -cover

open:
  devbuddy: https://github.com/devbuddy/devbuddy/blob/main/Documentation.md
